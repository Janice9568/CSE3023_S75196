<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
<div>
    <h2>Customer Discount</h2>
    <form action="processCustomer.jsp" method="post">
        <div>
            <label for="custcode">Customer Code</label>
            <input type="text" id="custcode" name="customerCode" placeholder="Key-in customer code" required>
        </div>

        <div>
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" name="quantity" placeholder="Key-in quantity">
        </div>

        <div>
            <label>Customer Type</label>
            <div>
                <label for="normalCust">
                    <input type="radio" id="normalCust" name="customerType" value="1" checked>
                    Normal Customer
                </label>

                <label for="privilegeCust">
                    <input type="radio" id="privilegeCust" name="customerType" value="2">
                    Privilege Customer
                </label>
            </div>
        </div>

        <div>
            <button type="submit">Submit</button>
            <button type="reset">Cancel</button>
        </div>
    </form>
</div>
</body>
</html>
