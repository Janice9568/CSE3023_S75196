<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>currency conversion</h2>
<form action="processCurrency.jsp" method="post">
    <div>
        <label for="amount">Amount (in RM)</label>
        <input type="number" id="amount" name="amount" placeholder="[in RM]">
    </div>

    <div>
        <label for="convert">Convert to</label>
        <select id="convert" name="conversion">
            <option value="1">USD</option>
            <option value="2">EURO</option>
            <option value="3">JPY</option>
            <option value="4">SGD</option>
        </select>
    </div>

    <button type="submit">Submit</button>
    <button type="submit">Cancel</button>
</form>
</body>
</html>
