<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Discount Application</title>
    <link rel="stylesheet" href="../style.css">

</head>
<body>

<div class="container">
    <div class="header-title">
        Use JSP Scriptlet and JSP Expression in Application
    </div>

    <div class="card">
        <h2>Customer Discount</h2>

        <form action="processCustomer.jsp" method="post">

            <div class="form-group">
                <label for="customerCode">Customer Code</label>
                <input type="text" id="customerCode" name="customerCode" placeholder="Key-in customer code" required>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" placeholder="Key-in quantity" required>
            </div>

            <div class="form-group">
                <label>Customer Type</label>
                <div class="radio-group">
                    <input type="radio" id="normal" name="customerType" value="1" checked>
                    <label for="normal">Normal Customer</label>

                    <input type="radio" id="privilege" name="customerType" value="2">
                    <label for="privilege">Privilege Customer</label>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Submit</button>
                <button type="reset" class="btn-cancel">Cancel</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
